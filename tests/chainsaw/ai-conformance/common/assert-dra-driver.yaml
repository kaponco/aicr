# Assert NVIDIA DRA driver controller and kubelet plugin are healthy.
# fullnameOverride: nvidia-dra-driver-gpu (from values.yaml)
# Chart: nvidia/nvidia-dra-driver-gpu 25.8.1
# Requires Kubernetes 1.34+ (DRA GA).

# DRA driver controller — manages GPU resource claims
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvidia-dra-driver-gpu-controller
  namespace: nvidia-dra-driver
status:
  (conditions[?type == 'Available']):
    - status: "True"
---
# DRA driver kubelet plugin — runs on GPU nodes, handles device allocation
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-dra-driver-gpu-kubelet-plugin
  namespace: nvidia-dra-driver
status:
  (numberReady > `0`): true
  (desiredNumberScheduled > `0`): true
