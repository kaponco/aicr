# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: helm-values-discovery
spec:
  description: |
    Validates the helm-values deployment check discovers deployed Helm components.
    Flow:
      1. Generate recipe with Helm components (gpu-operator)
      2. Create mock snapshot with matching Helm release data
      3. Run deployment-phase validate (--no-cluster)
      4. Verify helm-values check passes (values match)
      5. Create mismatched snapshot, verify check detects drift
    No cluster needed. Run with:
      AICR_BIN=$(pwd)/dist/e2e/aicr chainsaw test --no-cluster --test-dir tests/chainsaw/cli/helm-values-discovery
  timeouts:
    exec: 30s
  steps:

    # ── Step 1: Generate recipe ──────────────────────────────────────
    - name: generate-recipe
      description: Generate an EKS H100 training recipe with gpu-operator component.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-helm-values-discovery"
              rm -rf "${WORK}" && mkdir -p "${WORK}"
              ${AICR_BIN} recipe \
                --service eks \
                --accelerator h100 \
                --intent training \
                --os ubuntu \
                --output "${WORK}/recipe.yaml"

    - name: verify-recipe-has-helm-components
      description: Verify recipe includes gpu-operator as a Helm component.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-helm-values-discovery"
              grep -q "gpu-operator" "${WORK}/recipe.yaml"
              grep -q "type: Helm" "${WORK}/recipe.yaml"
            check:
              ($error == null): true

    # ── Step 2: Create mock snapshot with matching Helm data ─────────
    - name: create-matching-snapshot
      description: Create a mock snapshot with Helm release data that matches the recipe values.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-helm-values-discovery"
              cat > "${WORK}/snapshot-matching.yaml" << 'SNAP'
              measurements:
                - type: K8s
                  subtypes:
                    - name: server
                      data:
                        version: v1.33.0
                    - name: helm
                      data:
                        gpu-operator.chart: gpu-operator
                        gpu-operator.namespace: gpu-operator
                        gpu-operator.revision: "1"
                        gpu-operator.status: deployed
                        gpu-operator.version: "25.3.0"
                        gpu-operator.values.driver.version: "580.105.08"
                        gpu-operator.values.driver.enabled: "true"
                        gpu-operator.values.driver.useOpenKernelModules: "true"
                        gpu-operator.values.driver.rdma.enabled: "true"
                        gpu-operator.values.dcgm.enabled: "true"
                        gpu-operator.values.toolkit.enabled: "true"
                        gpu-operator.values.gfd.enabled: "true"
                        gpu-operator.values.gdrcopy.enabled: "true"
                        gpu-operator.values.gdrcopy.version: v2.5
                        gpu-operator.values.fullnameOverride: gpu-operator
                        gpu-operator.values.operator.upgradeCRD: "true"
                        gpu-operator.values.migManager.enabled: "true"
                - type: OS
                  subtypes:
                    - name: release
                      data:
                        ID: ubuntu
                        VERSION_ID: "24.04"
              SNAP

    # ── Step 3: Validate with matching snapshot (should pass) ────────
    - name: validate-deployment-matching
      description: Run deployment-phase validation. Helm-values check should pass with matching data.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-helm-values-discovery"
              ${AICR_BIN} validate \
                --recipe "${WORK}/recipe.yaml" \
                --snapshot "${WORK}/snapshot-matching.yaml" \
                --phase deployment \
                --no-cluster \
                --fail-on-error=false \
                --output "${WORK}/result-matching.yaml" 2>&1
            check:
              ($error == null): true

    - name: assert-helm-values-check-ran
      description: Verify the helm-values check appears in the deployment phase results.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-helm-values-discovery"
              grep -q "helm-values" "${WORK}/result-matching.yaml"
            check:
              ($error == null): true

    # ── Step 4: Create mismatched snapshot (driver version drift) ────
    - name: create-mismatched-snapshot
      description: Create a mock snapshot where driver.version differs from recipe.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-helm-values-discovery"
              cat > "${WORK}/snapshot-mismatched.yaml" << 'SNAP'
              measurements:
                - type: K8s
                  subtypes:
                    - name: server
                      data:
                        version: v1.33.0
                    - name: helm
                      data:
                        gpu-operator.chart: gpu-operator
                        gpu-operator.namespace: gpu-operator
                        gpu-operator.revision: "1"
                        gpu-operator.status: deployed
                        gpu-operator.version: "25.3.0"
                        gpu-operator.values.driver.version: "550.99.99"
                        gpu-operator.values.driver.enabled: "true"
                        gpu-operator.values.dcgm.enabled: "true"
                        gpu-operator.values.toolkit.enabled: "true"
                        gpu-operator.values.fullnameOverride: gpu-operator
                - type: OS
                  subtypes:
                    - name: release
                      data:
                        ID: ubuntu
                        VERSION_ID: "24.04"
              SNAP

    # ── Step 5: Validate with mismatched snapshot (should detect drift) ──
    - name: validate-deployment-mismatched
      description: Run deployment-phase validation. Helm-values check should detect driver version drift.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-helm-values-discovery"
              ${AICR_BIN} validate \
                --recipe "${WORK}/recipe.yaml" \
                --snapshot "${WORK}/snapshot-mismatched.yaml" \
                --phase deployment \
                --no-cluster \
                --fail-on-error=false \
                --output "${WORK}/result-mismatched.yaml" 2>&1
            check:
              ($error == null): true

    - name: assert-drift-detected
      description: Verify the validation result detects helm values mismatch.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-helm-values-discovery"
              grep -q "mismatch\|fail\|driver.version" "${WORK}/result-mismatched.yaml"
            check:
              ($error == null): true

    # ── Step 6: Validate with skip-helm-check flag ───────────────────
    - name: validate-skip-helm-check
      description: Verify --skip-helm-check suppresses the helm-values check entirely.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-helm-values-discovery"
              ${AICR_BIN} validate \
                --recipe "${WORK}/recipe.yaml" \
                --snapshot "${WORK}/snapshot-mismatched.yaml" \
                --phase deployment \
                --no-cluster \
                --skip-helm-check \
                --fail-on-error=false \
                --output "${WORK}/result-skipped.yaml" 2>&1
            check:
              ($error == null): true

    # ── Step 7: Verify new helm RBAC flags exist ─────────────────────
    - name: check-helm-flags
      description: Verify both snapshot and validate commands expose helm namespace flags.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              missing=""
              for cmd_name in snapshot validate; do
                help_output=$(${AICR_BIN} ${cmd_name} --help 2>&1)
                for flag in helm-namespaces helm-all-namespaces; do
                  echo "$help_output" | grep -q "$flag" || missing="$missing ${cmd_name}:${flag}"
                done
              done
              # validate also has skip-helm-check
              help_output=$(${AICR_BIN} validate --help 2>&1)
              echo "$help_output" | grep -q "skip-helm-check" || missing="$missing validate:skip-helm-check"
              if [ -n "$missing" ]; then
                echo "Missing flags:$missing" >&2
                exit 1
              fi
            check:
              ($error == null): true
      cleanup:
        - script:
            content: |
              rm -rf /tmp/chainsaw-helm-values-discovery
