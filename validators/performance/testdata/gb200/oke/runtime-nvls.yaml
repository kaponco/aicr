# NCCL all-reduce TrainingRuntime for GB200 on OKE, NVLS-transport variant.
#
# Validates Multi-Node NVLink (MNNVL / NVLS) through the DRA compute-domain
# IMEX channel that the validator creates before launching the TrainJob.
# NCCL_DEBUG=INFO emits the NVLS communicator-init lines that the validator
# uses to reject silent fallback to a network transport.
#
# Must stay in sync with ncclTrainingRuntimeName in nccl_all_reduce_bw_constraint.go.

apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainingRuntime
metadata:
  name: nccl-all-reduce-runtime
  namespace: ${NAMESPACE}
  labels:
    trainer.kubeflow.org/framework: mpi
spec:
  mlPolicy:
    mpi:
      mpiImplementation: OpenMPI
      numProcPerNode: ${GPU_COUNT_PER_NODE}
      runLauncherAsNode: false
      sshAuthMountPath: /tmp/mpi-keys
  template:
    spec:
      network:
        enableDNSHostnames: true
        publishNotReadyAddresses: true
      replicatedJobs:
      - name: launcher
        replicas: 1
        template:
          spec:
            template:
              spec:
                tolerations:
                - operator: Exists
                initContainers:
                - name: fix-ssh-perms
                  image: nvcr.io/nvidia/pytorch:25.06-py3
                  command:
                  - /bin/sh
                  - -c
                  - |
                    mkdir -p /root/.ssh
                    cp /tmp/mpi-keys/id_rsa /root/.ssh/id_rsa
                    cp /tmp/mpi-keys/authorized_keys /root/.ssh/authorized_keys
                    chmod 700 /root/.ssh
                    chmod 600 /root/.ssh/id_rsa /root/.ssh/authorized_keys
                  volumeMounts:
                  - name: mpi-ssh-auth
                    mountPath: /tmp/mpi-keys
                    readOnly: true
                  - name: ssh-config
                    mountPath: /root/.ssh
                containers:
                - name: node
                  image: nvcr.io/nvidia/pytorch:25.06-py3
                  env:
                  - name: LD_LIBRARY_PATH
                    value: "/usr/local/nvidia/lib64:/usr/local/cuda/lib64"
                  command:
                  - /usr/local/mpi/bin/mpirun
                  args:
                  - -np
                  - "${GPU_COUNT}"
                  - --allow-run-as-root
                  - --mca
                  - plm_rsh_args
                  - -o StrictHostKeyChecking=no -o ConnectionAttempts=10
                  - --mca
                  - btl
                  - ^openib
                  - --mca
                  - btl_tcp_if_include
                  - eth0
                  - --mca
                  - oob_tcp_if_include
                  - eth0
                  - -x
                  - LD_LIBRARY_PATH
                  - -x
                  - NCCL_DEBUG=INFO
                  - -x
                  - NCCL_NVLS_ENABLE=1
                  - -x
                  - NCCL_NET_PLUGIN=none
                  - -x
                  - NCCL_SOCKET_IFNAME=eth0
                  - -x
                  - NCCL_IGNORE_DISABLED_P2P=1
                  - /usr/local/bin/${TEST_TYPE}_mpi
                  - -b
                  - ${MIN_MESSAGE_SIZE}
                  - -e
                  - ${MAX_MESSAGE_SIZE}
                  - -f
                  - "2"
                  - -g
                  - "1"
                  resources:
                    limits:
                      cpu: "2"
                      memory: 128Mi
                  volumeMounts:
                  - name: ssh-config
                    mountPath: /root/.ssh
                volumes:
                - name: ssh-config
                  emptyDir: {}
      - name: node
        template:
          spec:
            template:
              spec:
                resourceClaims:
                - name: imex-channel
                  resourceClaimTemplateName: nccl-all-reduce-imex
                initContainers:
                - name: fix-ssh-perms
                  image: nvcr.io/nvidia/pytorch:25.06-py3
                  command:
                  - /bin/sh
                  - -c
                  - |
                    apt-get update &&
                    apt-get install -y --no-install-recommends openssh-server &&
                    mkdir -p /var/run/sshd &&
                    chmod 0755 /var/run/sshd &&
                    mkdir -p /root/.ssh &&
                    cp /tmp/mpi-keys/authorized_keys /root/.ssh/authorized_keys &&
                    chmod 700 /root/.ssh &&
                    chmod 600 /root/.ssh/authorized_keys
                  volumeMounts:
                  - name: mpi-ssh-auth
                    mountPath: /tmp/mpi-keys
                    readOnly: true
                  - name: ssh-config
                    mountPath: /root/.ssh
                containers:
                - name: node
                  image: nvcr.io/nvidia/pytorch:25.06-py3
                  command: ["sh", "-c"]
                  args:
                  - |
                    apt-get update &&
                    apt-get install -y --no-install-recommends openssh-server &&
                    mkdir -p /var/run/sshd &&
                    chmod 0755 /var/run/sshd &&
                    mkdir -p /root/.ssh &&
                    cp /tmp/mpi-keys/* /root/.ssh/ &&
                    chmod 700 /root/.ssh &&
                    chmod 600 /root/.ssh/authorized_keys &&
                    /usr/sbin/sshd -De
                  resources:
                    claims:
                    - name: imex-channel
                    limits:
                      nvidia.com/gpu: ${GPU_COUNT_PER_NODE}
                    requests:
                      nvidia.com/gpu: ${GPU_COUNT_PER_NODE}
                  securityContext:
                    capabilities:
                      add: ["IPC_LOCK"]
                  volumeMounts:
                  - name: ssh-config
                    mountPath: /root/.ssh
                  - name: dshm
                    mountPath: /dev/shm
                volumes:
                - name: ssh-config
                  emptyDir: {}
                - name: dshm
                  emptyDir:
                    medium: Memory
      successPolicy:
        operator: All
        targetReplicatedJobs:
        - launcher
