# NodeFeatureDiscovery CR for NFD configuration on OpenShift
# This configures the NFD operator that was installed via OLM.
# Reference: https://docs.openshift.com/container-platform/latest/hardware_enablement/psap-node-feature-discovery-operator.html
---
apiVersion: nfd.openshift.io/v1
kind: NodeFeatureDiscovery
metadata:
  name: nfd-instance
  namespace: openshift-nfd
spec:
  operand:
    image: registry.redhat.io/openshift4/ose-node-feature-discovery:v4.14
    imagePullPolicy: Always
  workerConfig:
    configData: |
      core:
        sleepInterval: 60s
      sources:
        pci:
          deviceClassWhitelist:
            - "0200"
            - "03"
            - "12"
          deviceLabelFields:
            - "vendor"
