# AWS EBS CSI Driver Helm values
# Base configuration for EKS deployments

# Override release name prefix to avoid aicr-stack- prefix in resource names
fullnameOverride: aws-ebs-csi-driver

image:
  repository: public.ecr.aws/ebs-csi-driver/aws-ebs-csi-driver
  pullPolicy: IfNotPresent

controller:
  replicaCount: 2
  resources:
    requests:
      cpu: 10m
      memory: 40Mi
    limits:
      memory: 256Mi
  serviceAccount:
    create: true
    name: ebs-csi-controller-sa
    automountServiceAccountToken: true

node:
  tolerateAllTaints: true
  resources:
    requests:
      cpu: 10m
      memory: 40Mi
    limits:
      memory: 256Mi
  serviceAccount:
    create: true
    name: ebs-csi-node-sa
    automountServiceAccountToken: true
  enableLinux: true
  enableWindows: false
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: "10%"

storageClasses: []

# Provision a cluster-default StorageClass (ebs-csi-default-sc: gp3,
# WaitForFirstConsumer, expandable, annotated is-default-class=true). EKS ships
# no default StorageClass on its own, so without this any PVC created without an
# explicit storageClassName — including the inference-perf model-weights cache —
# stays Pending. Enabling it here makes dynamic provisioning "just work" on
# AICR-deployed EKS clusters. NOTE: this sets a *cluster-wide* default; if the
# cluster already has another default StorageClass, unset that one to avoid two
# defaults (which Kubernetes treats as ambiguous).
defaultStorageClass:
  enabled: true

volumeSnapshotClasses: []

helmTester:
  enabled: false
