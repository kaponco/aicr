# These defaults must stay aligned with the Slinky NodeSet in the GB200 Slurm
# overlay. If a customer overrides the claim name or ResourceClaimTemplate name
# and introduces a mismatch, Slurm node pods can remain Pending.
---
apiVersion: resource.nvidia.com/v1beta1
kind: ComputeDomain
metadata:
  annotations:
    # preManifestFiles and dependencyRefs provide ordering for this CR.
    aicr/skip-hook-validation: "true"
  labels:
    app.kubernetes.io/created-by: aicr
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
  name: slinky-slurm-imex
  namespace: {{ .Release.Namespace }}
spec:
  channel:
    allocationMode: All
    resourceClaimTemplate:
      name: slinky-slurm-imex-channels
