# ClusterPolicy custom resource for OpenShift (OCP) deployment
# This resource configures the GPU Operator when deployed via OLM
apiVersion: nvidia.com/v1
kind: ClusterPolicy
metadata:
  name: gpu-cluster-policy
spec:
  operator:
    defaultRuntime: crio
  driver:
    enabled: true
    usePrecompiled: true
    version: "570.86.15"
    rdma:
      enabled: true
      useHostMofed: false
  cdi:
    enabled: true
    default: true
  dcgm:
    enabled: true
  gfd:
    enabled: true
  dcgmExporter:
    enabled: true
    serviceMonitor:
      enabled: true
  devicePlugin:
    enabled: false
  toolkit:
    enabled: true
    installDir: /usr/local/nvidia
  gdrcopy:
    enabled: false
  sandboxWorkloads:
    enabled: false
  nodeStatusExporter:
    enabled: true
  daemonsets:
    tolerations:
      - operator: Exists
    rollingUpdate:
      maxUnavailable: '1'
    updateStrategy: RollingUpdate
