# ClusterPolicy overlay for OpenShift training workloads
# This merges with resources-ocp.yaml and adds training-specific settings
apiVersion: nvidia.com/v1
kind: ClusterPolicy
metadata:
  name: gpu-cluster-policy
spec:
  dcgm:
    enabled: true
  dcgmExporter:
    enabled: true
    serviceMonitor:
      enabled: true
      # Training-specific: increase interval for long-running jobs
      interval: 60s
  # Training-specific: enable MIG for multi-tenant training
  mig:
    strategy: mixed
