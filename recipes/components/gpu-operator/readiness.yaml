# GPU Operator readiness gate.
#
# Asserts the operator's ClusterPolicy has reconciled to state=ready. This is
# the deploy-time signal that none of Helm --wait / Argo CD / Flux can assess
# natively: the gpu-operator Deployment going Available only means the operator
# process started, not that the driver/toolkit/device-plugin operands have
# rolled out across GPU nodes. The operator folds that operand rollout into
# ClusterPolicy.status.state, flipping it to "ready" only once the stack is
# usable for GPU workloads.
#
# ClusterPolicy is cluster-scoped, so the assertion is namespace-agnostic; the
# gate's --namespace flag (set to the resolved component namespace by the
# bundler) governs only namespaced lookups, of which this test has none.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: gpu-operator-readiness
spec:
  # The gate CLI owns the outer retry/poll loop (--poll-interval / --max-wait),
  # so a single assert pass only needs a short window to confirm the current
  # ClusterPolicy state.
  timeouts:
    assert: 30s
  steps:
    - name: clusterpolicy-ready
      try:
        - assert:
            resource:
              apiVersion: nvidia.com/v1
              kind: ClusterPolicy
              # Match every ClusterPolicy instance; the operator creates one
              # named "cluster-policy" by default, but match by state rather
              # than name so a renamed policy still gates correctly.
              status:
                state: ready
