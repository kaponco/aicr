# ClusterPolicy CR for NVIDIA GPU Operator on OpenShift
# This configures the GPU operator that was installed via OLM.
# Reference: https://docs.nvidia.com/datacenter/cloud-native/openshift/latest/install-gpu-ocp.html
---
apiVersion: nvidia.com/v1
kind: ClusterPolicy
metadata:
  name: gpu-cluster-policy
spec:
  operator:
    # OpenShift uses CRI-O as the default container runtime
    defaultRuntime: crio

  driver:
    enabled: true
    # Driver version for OpenShift / RHEL CoreOS
    version: "550.54.15"

  toolkit:
    enabled: true

  devicePlugin:
    enabled: true

  # DCGM exporter for Prometheus metrics
  dcgmExporter:
    enabled: true
    config:
      name: ""

  # GPU Feature Discovery
  gfd:
    enabled: true

  # Node Feature Discovery - disabled because it's deployed as a standalone component
  nfd:
    enabled: false
