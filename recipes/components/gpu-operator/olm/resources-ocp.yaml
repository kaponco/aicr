# ClusterPolicy custom resource for OpenShift (OCP) deployment
# This resource configures the GPU Operator when deployed via OLM
apiVersion: nvidia.com/v1
kind: ClusterPolicy
metadata:
  name: cluster-policy
spec:
  operator:
    defaultRuntime: crio
  driver:
    enabled: true
    rdma:
      enabled: true
      useHostMofed: false
  cdi:
    enabled: true
    default: true
  dcgm:
    enabled: true
  gfd:
    enabled: true
  dcgmExporter:
    enabled: true
    serviceMonitor:
      enabled: true
  devicePlugin:
    enabled: true
  toolkit:
    enabled: true
    installDir: /usr/local/nvidia
  gdrcopy:
    enabled: false
  sandboxWorkloads:
    enabled: false
  nodeStatusExporter:
    enabled: true
  daemonsets:
    tolerations:
      - operator: Exists
    rollingUpdate:
      maxUnavailable: '1'
    updateStrategy: RollingUpdate
