# Node Feature Discovery OLM Installation Resources for OpenShift
# These manifests install NFD via OpenShift's Operator Lifecycle Manager (OLM).
# Reference: https://docs.openshift.com/container-platform/latest/hardware_enablement/psap-node-feature-discovery-operator.html
---
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-nfd
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: nfd-operator-group
  namespace: openshift-nfd
spec:
  targetNamespaces:
  - openshift-nfd
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: nfd
  namespace: openshift-nfd
spec:
  channel: stable
  name: nfd
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
