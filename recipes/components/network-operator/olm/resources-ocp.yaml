# NicClusterPolicy custom resource for OpenShift (OCP) deployment
# This resource configures the Network Operator when deployed via OLM
# Uses operator-recommended image versions from CSV examples
apiVersion: mellanox.com/v1alpha1
kind: NicClusterPolicy
metadata:
  name: nic-cluster-policy
spec:
  # OFED driver enables RDMA support for Mellanox/NVIDIA NICs
  ofedDriver:
    image: doca-driver
    repository: nvcr.io/nvidia/mellanox
    version: doca3.3.0-26.01-1.0.0.0-0

  # RDMA shared device plugin enables RDMA device sharing
  rdmaSharedDevicePlugin:
    image: k8s-rdma-shared-dev-plugin
    repository: nvcr.io/nvidia/mellanox
    version: sha256:cd489dfcddeb8ef67284d177cabc347f01d6b4fba0a44335a2026f6b6e11c847
