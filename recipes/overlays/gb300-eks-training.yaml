kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: gb300-eks-training

spec:
  # Inherits from eks-training recipe (EKS + training settings)
  base: eks-training

  criteria:
    service: eks
    accelerator: gb300
    intent: training

  # Specific constraints for GB300 on EKS training workloads.
  # GB300 (Blackwell Ultra) shares GB200's NVL72 topology and gpu-operator
  # floor, so the EKS prerequisites mirror gb200-eks-training.
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.32.4"

  componentRefs:
    # GB300+EKS GPU Operator prerequisites. Keep in sync with the same block
    # in gb300-eks-inference.yaml — the mixin system can't extend componentRefs
    # already declared in the inheritance chain (gpu-operator comes from
    # eks-training / eks-inference), so this lives per-leaf for now.
    - name: gpu-operator
      type: Helm
      preManifestFiles:
        # Ships a ConfigMap with options nvidia NVreg_GrdmaPciTopoCheckOverride=1.
        # driver.kernelModuleConfig.name (below) points the ClusterPolicy at it,
        # so the driver DaemonSet mounts nvidia.conf and the kernel loads with
        # the flag set — required on GB200/GB300+EFA for EFA dma-buf attach to
        # the Grace PCI topology. Without it, NCCL silently falls back to Socket.
        #
        # Must be preManifestFiles (applied before the chart): the chart's
        # ClusterPolicy reconcile reads this ConfigMap during `helm install --wait`,
        # so a post-install pass would deadlock until the chart times out (#859).
        - components/gpu-operator/manifests/kernel-module-params.yaml
      dependencyRefs:
        - nfd
        - cert-manager
        - kube-prometheus-stack
        - nodewright-customizations
      overrides:
        cdi:
          enabled: true
        gdrcopy:
          enabled: true
        driver:
          kernelModuleConfig:
            name: nvidia-kernel-module-params

    # GB300 reuses the gb200 nodewright tuning profile: GB300 shares GB200's
    # ARM64 Grace host and Blackwell NVL72 platform, and no gb300-specific
    # nvidia-setup/nvidia-tuned package exists. Per the nodewright maintainer
    # this reuse is expected to work, with one caveat to watch: GB300 may hit
    # the DOCA issue that the AWS GPU AMI already carries a work-around for —
    # revisit if EFA/RDMA bring-up regresses on GB300 nodes. Switch to a gb300
    # selector once GB300-specific packages are available.
    - name: nodewright-customizations
      type: Helm
      manifestFiles:
        - components/nodewright-customizations/manifests/tuning.yaml
      overrides:
        service: eks
        accelerator: gb200
        intent: multiNodeTraining
      dependencyRefs:
        - nodewright-operator

    - name: nfd
      type: Helm
      overrides:
        topologyUpdater:
          enable: true

  # Validation checks for GB300 on EKS training workloads.
  # Defined at the intent layer (not OS-specific) so all OS variants inherit them.
  validation:
    deployment:
      checks:
        - operator-health
        - expected-resources
        - gpu-operator-version
        - check-nvidia-smi
      constraints:
        # GB300 support shipped in gpu-operator v25.10 (same release as GB200).
        - name: Deployment.gpu-operator.version
          value: ">= v25.10.0"
    performance:
      # NET exercises EFA (the external interconnect) and NVLS exercises MNNVL
      # across the NVL72 IMEX domain — each variant asserts its transport
      # actually carried traffic. GB300 uses the same 5th-gen NVLink (1.8 TB/s)
      # as GB200, so the NVLS floor carries over unchanged; GB300's CX8 NICs
      # should meet or exceed the NET floor. Both are loose starting values
      # inherited from GB200 and will be raised once GB300 NVL72 data exists.
      checks:
        - nccl-all-reduce-bw-net
        - nccl-all-reduce-bw-nvls
      constraints:
        - name: nccl-all-reduce-bw-net
          value: ">= 40"
        - name: nccl-all-reduce-bw-nvls
          value: ">= 500"
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - gang-scheduling
        - pod-autoscaling
        - cluster-autoscaling
