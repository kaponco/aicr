kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: ocp-training

spec:
  # Inherits from ocp recipe (OpenShift-specific settings)
  # This overlay adds training-specific resource configurations
  base: ocp

  criteria:
    service: ocp
    intent: training

  # Override GPU Operator resources to use training-specific file
  componentRefs:
    - name: gpu-operator
      type: OLM
      resourcesFile: components/gpu-operator/olm/resources-ocp-training.yaml

# Validation configuration for OCP training deployments - currently no validation for ocp training
