kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: ocp-training

spec:
  base: ocp

  criteria:
    service: ocp
    intent: training

  constraints:
    - name: K8s.server.version
      value: ">= 1.29"

  componentRefs:
    # Training-optimized GPU Operator ClusterPolicy overrides
    - name: gpu-operator-ocp
      type: Helm
      valuesFile: components/gpu-operator-ocp/values-training.yaml

    # Network Operator via OLM for RDMA/InfiniBand training workloads
    - name: network-operator-ocp-olm
      type: Helm
      valuesFile: components/network-operator-ocp-olm/values.yaml
      manifestFiles:
        - components/network-operator-ocp-olm/manifests/operatorgroup.yaml
        - components/network-operator-ocp-olm/manifests/subscription.yaml

    - name: network-operator-ocp
      type: Helm
      valuesFile: components/network-operator-ocp/values.yaml
      manifestFiles:
        - components/network-operator-ocp/manifests/nicclusterpolicy.yaml
      dependencyRefs:
        - network-operator-ocp-olm
