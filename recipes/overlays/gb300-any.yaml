# Cross-cutting overlay applied via criteria-wildcard matching.
#
# Carries the deployment-phase floor (the 4 standard checks plus the
# gpu-operator version pin) and applies to every GB300 query regardless
# of service or intent, so every concrete GB300 leaf inherits the version
# pin. Mirrors gb200-any.yaml — GB300 (Blackwell Ultra) shares GB200's
# gpu-operator support floor (both stabilized in v25.10).
#
# Per-field union merge (see pkg/recipe/metadata.go) means concrete leaves
# that declare their own `deployment:` block add to or override this floor
# without dropping its inherited checks — same-name constraints from the
# leaf win, additional checks are appended.
#
# See docs/contributor/recipe.md#criteria-wildcard-overlays for details.

kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: gb300-any

spec:
  base: base

  criteria:
    service: any
    accelerator: gb300

  validation:
    deployment:
      checks:
        - operator-health
        - expected-resources
        - gpu-operator-version
        - check-nvidia-smi
      constraints:
        # GB300 (Blackwell Ultra) support shipped in the same gpu-operator
        # v25.10 release as GB200. Concrete leaves can tighten if they pin to
        # a later working version.
        - name: Deployment.gpu-operator.version
          value: ">= v25.10.0"
