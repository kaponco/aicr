kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: ocp

spec:
  # Inherits from base (implicit when spec.base is empty)
  # This recipe contains OpenShift-specific settings shared by all OCP deployments

  criteria:
    service: ocp

  # OCP-specific constraints
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.30"

    # Verify NVIDIA GPU Operator ClusterPolicy CRD is established
    - name: K8s.crd.clusterpolicies.nvidia.com.established
      value: "true"

    # Verify NFD Operator NodeFeatureDiscovery CRD is established
    - name: K8s.crd.nodefeaturediscoveries.nfd.openshift.io.established
      value: "true"

    # Verify Network Operator NicClusterPolicy CRD is established
    - name: K8s.crd.nicclusterpolicies.mellanox.com.established
      value: "true"

  # OCP-specific components deployed via OLM
  componentRefs:
    # NFD Operator deployed via OLM (Operator Lifecycle Manager)
    # NFD must be deployed before GPU Operator as it provides hardware detection
    - name: nfd
      type: OLM
      resourcesFile: components/nfd/olm/resources-ocp.yaml

    # GPU Operator deployed via OLM (Operator Lifecycle Manager)
    # OLM is the standard deployment method for operators on OpenShift
    - name: gpu-operator
      type: OLM
      resourcesFile: components/gpu-operator/olm/resources-ocp.yaml
      dependencyRefs:
        - nfd

    # Network Operator deployed via OLM (Operator Lifecycle Manager)
    # Provides RDMA and networking capabilities for GPU workloads
    - name: network-operator
      type: OLM
      resourcesFile: components/network-operator/olm/resources-ocp.yaml
      dependencyRefs:
        - gpu-operator

    # Disable all base components to prevent inheritance
    - name: cert-manager
      type: Helm
      overrides:
        enabled: false

    - name: nvsentinel
      type: Helm
      overrides:
        enabled: false

    - name: nodewright-operator
      type: Helm
      overrides:
        enabled: false

    - name: kube-prometheus-stack
      type: Helm
      overrides:
        enabled: false

    - name: k8s-ephemeral-storage-metrics
      type: Helm
      overrides:
        enabled: false

    - name: nvidia-dra-driver-gpu
      type: Helm
      overrides:
        enabled: false

    - name: kai-scheduler
      type: Helm
      overrides:
        enabled: false

    - name: prometheus-adapter
      type: Helm
      overrides:
        enabled: false

  # Validation configuration for OCP deployments
  validation:
    deployment:
      checks:
        - operator-health
        - expected-resources
      constraints:
        - name: Deployment.gpu-operator.version
          value: ">= v24.6.0"
