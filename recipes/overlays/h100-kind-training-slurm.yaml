kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: h100-kind-training-slurm

spec:
  # H100 + Kind + training with the Slinky operator and a Slinky-managed
  # Slurm cluster. Kind has no GPUs, so the NodeSet runs CPU-only (no
  # GRES, no nvidia.com/gpu, no DCGM); useful for no-GPU CI end-to-end.
  base: h100-kind-training

  criteria:
    service: kind
    accelerator: h100
    intent: training
    platform: slurm

  mixins:
    - platform-slurm
    - platform-slurm-cluster

  # DRA (GA in K8s 1.34) — restated from the parent for clarity.
  constraints:
    - name: K8s.server.version
      value: ">= 1.34"

  # Mixin-contributed components cannot be overridden from a leaf; use
  # `--set slurmcluster:...` or a valuesFile at install time instead.
  componentRefs: []

  # Validation is inherited from h100-kind-training.
