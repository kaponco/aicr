kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: ocp-inference-nim

spec:
  # Inherits from ocp-inference (OCP inference settings).
  # Adds the certified NVIDIA NIM Operator via OLM for managing NIM
  # microservice deployments.
  base: ocp-inference

  criteria:
    service: ocp
    intent: inference
    platform: nim

  constraints:
    - name: K8s.server.version
      value: ">= 1.29"

  componentRefs:
    # NIM Operator via OLM. Unlike gpu-operator/nfd/network-operator, it has
    # no CR phase: its owned CRDs (NimCache, NimService, ...) are
    # workload-scoped resources applied by consumers, not a bootstrap CR the
    # platform overlay itself needs to create. OLM manages the operator's
    # admission-webhook TLS natively, so cert-manager is not required here.
    - name: k8s-nim-operator-ocp-olm
      type: Helm
      valuesFile: components/k8s-nim-operator-ocp-olm/values.yaml
      manifestFiles:
        - components/k8s-nim-operator-ocp-olm/manifests/operatorgroup.yaml
        - components/k8s-nim-operator-ocp-olm/manifests/subscription.yaml
      dependencyRefs:
        - gpu-operator-ocp
      expectedResources:
        - kind: Deployment
          namespace: nvidia-nim-operator
          name: k8s-nim-operator
