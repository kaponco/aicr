# Opt-in mixin: a Slinky-managed Slurm cluster instance (Controller /
# LoginSet / NodeSet / RestApi) on top of the operator from
# platform-slurm. Leaves wanting only the operator compose
# platform-slurm alone; leaves wanting a runnable cluster compose both.
kind: RecipeMixin
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: platform-slurm-cluster
spec:
  componentRefs:
    - name: slinky-slurm
      type: Helm
      valuesFile: components/slinky-slurm/values.yaml
      dependencyRefs:
        - slinky-slurm-operator
        - slinky-slurm-operator-crds
