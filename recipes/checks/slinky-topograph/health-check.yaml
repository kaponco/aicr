# slinky-topograph Health Check
#
# Validates that slinky-topograph and its sub-charts (node-observer,
# node-data-broker) are running and healthy, and that the topology generation
# pipeline has produced a result. Specifically:
#   1. Both Deployments are available (topograph API, node-observer).
#   2. The node-data-broker DaemonSet (enabled by default in the shared
#      component values) has completed rollout.
#   3. No pods in the topograph namespace are in a failed/stuck state.
#   4. The topology ConfigMap (slinky-slurm-config-extra) in the slurm
#      namespace has a topology.conf key whose value contains a SwitchName
#      line, i.e. Topograph has completed a real sync. slinky-slurm's chart
#      seeds this key with an 'aicr-preseed'-marked placeholder, and the
#      check requires SwitchName content without that marker, so it fails
#      closed — the 5m assert retry times out — until Topograph patches in
#      real topology/tree output. The Kind leaf's inline healthCheckAsserts
#      variant asserts the exact fixture content.
# This file is read-only (assert/error operations only); overlays that
# disable node-data-broker or need exact-content assertions (e.g. the
# deterministic Kind test provider) carry their own inline
# healthCheckAsserts on the componentRef instead of a conditional script.
# Deployment names are stabilized via fullnameOverride in
# components/slinky-topograph/values.yaml.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: slinky-topograph-health-check
spec:
  timeouts:
    assert: 5m
  steps:
    - name: validate-topograph-deployment
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: slinky-topograph
                namespace: topograph
              status:
                (availableReplicas > `0`): true
    - name: validate-node-observer-deployment
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: slinky-topograph-node-observer
                namespace: topograph
              status:
                (availableReplicas > `0`): true
    - name: validate-node-data-broker-daemonset
      # node-data-broker is enabled by default in the shared component values.
      # This registry-level check asserts the default-enabled shape (full
      # rollout). The h100-kind-training-slurm overlay disables the DaemonSet
      # and therefore carries its own inline healthCheckAsserts on the
      # componentRef (which omits this step) — the read-only allowlist for
      # registry checks permits only assert/error operations, so a conditional
      # script skip is not an option here.
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: slinky-topograph-node-data-broker
                namespace: topograph
              status:
                # Non-omitempty fields only: NumberUnavailable is omitempty and
                # absent when healthy. desired > 0 guards the vacuous pass.
                (desiredNumberScheduled > `0`): true
                (numberReady == desiredNumberScheduled): true
    - name: validate-all-pods-healthy
      try:
        # Assert no pods are in unhealthy phases (Pending / Failed /
        # Unknown) or stuck in Running phase with a known-bad
        # container-waiting reason (CrashLoopBackOff,
        # ImagePullBackOff, ErrImagePull, CreateContainerConfigError).
        # Phase-only filtering misses CrashLoopBackOff because such
        # pods typically remain in Running phase with an unhealthy
        # container.
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: topograph
              status:
                phase: Pending
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: topograph
              status:
                phase: Failed
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: topograph
              status:
                phase: Unknown
        # JMESPath projection (not single-element match): kyverno-json's
        # sliceNode.Assert gates on exact slice length before per-element
        # comparison, so a `containerStatuses: - state: ...` shape only
        # matches single-container pods and silently passes sidecars. Use
        # `containerStatuses[?...] | length(@) > 0` to fire on any
        # container at any index. Parallel initContainerStatuses block
        # below catches init-container failures (invisible to
        # containerStatuses). Per PR #1245 review (@ArangoGutierrez).
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: topograph
              status:
                ((containerStatuses || `[]`)[?state.waiting.reason == 'CrashLoopBackOff' || state.waiting.reason == 'ImagePullBackOff' || state.waiting.reason == 'ErrImagePull' || state.waiting.reason == 'CreateContainerConfigError'] | length(@) > `0`): true
        - error:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                namespace: topograph
              status:
                ((initContainerStatuses || `[]`)[?state.waiting.reason == 'CrashLoopBackOff' || state.waiting.reason == 'ImagePullBackOff' || state.waiting.reason == 'ErrImagePull' || state.waiting.reason == 'CreateContainerConfigError'] | length(@) > `0`): true
    - name: validate-topology-configmap
      # Sync-success gate, provider-agnostic: the chart-owned
      # slinky-slurm-config-extra ConfigMap is mounted into slurmctld via
      # configFileRefs, and Topograph patches its topology.conf key after
      # each successful sync. The chart seeds that key with a syntactically
      # valid one-switch placeholder marked 'aicr-preseed' (a comment-only
      # zero-switch seed would fatal slurmctld on reconfigure/restart once
      # nodes register — see the overlay seed comment). Real topology/tree
      # output contains SwitchName lines and never the marker. Asserting the
      # value contains 'SwitchName' therefore fails closed until Topograph
      # completes a real sync: an unconfigured provider (e.g. GKE without
      # Workload Identity) never patches the key, so the 5m assert retry
      # times out instead of passing vacuously on the seed. contains(null,
      # ...) on a missing key also fails closed. The Kind leaf's inline
      # healthCheckAsserts adds the exact-content assertion for the
      # deterministic test provider.
      try:
        - assert:
            resource:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: slinky-slurm-config-extra
                namespace: slurm
              data:
                (contains("topology.conf", 'SwitchName') && !contains("topology.conf", 'aicr-preseed')): true
