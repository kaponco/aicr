# Skyhook GB200 EKS Ubuntu Training Customization
# Minimal templating - only tolerations/nodeSelectors are dynamic for CLI flag support
#
# This customization configures GB200 GPU nodes on Ubuntu with:
# - GRUB parameters for hugepages and nokaslr
# - Containerd service limits
# - Sysctl kernel tuning parameters
{{- $cust := index .Values "skyhook-customizations" }}
---
apiVersion: skyhook.nvidia.com/v1alpha1
kind: Skyhook
metadata:
  labels:
    app.kubernetes.io/part-of: skyhook-operator
    app.kubernetes.io/created-by: eidos
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
  name: gb200-eks-ubuntu-training
  namespace: {{ .Release.Namespace }}
spec:
  runtimeRequired: true
  # Dynamic: Supports --accelerated-node-toleration CLI flag
  additionalTolerations:
    {{- if $cust.tolerations }}
    {{- toYaml $cust.tolerations | nindent 4 }}
    {{- else }}
    - key: dedicated
      operator: Exists
    {{- end }}
  interruptionBudget:
    percent: 100
  # Dynamic: Supports --accelerated-node-selector CLI flag
  {{- if $cust.nodeSelector }}
  nodeSelectors:
    matchLabels:
      {{- toYaml $cust.nodeSelector | nindent 6 }}
  {{- end }}
  # Static: Baked-in tuning for GB200 Ubuntu training
  packages:
    tuning:
      image: ghcr.io/nvidia/skyhook-packages/tuning
      version: "1.1.4"
      configInterrupts:
        grub.conf:
          type: reboot
        service_containerd.conf:
          type: service
          services: ["containerd"]
        sysctl.conf:
          type: reboot
      interrupt:
        type: reboot
      configMap:
        grub.conf: |-
          hugepagesz=1G
          hugepages=2
          hugepagesz=2M
          hugepages=5128
          nokaslr
        service_containerd.conf: |-
          [Service]
          LimitSTACK=67108864
        sysctl.conf: |-
          fs.inotify.max_user_instances=65535
          fs.inotify.max_user_watches=524288
          kernel.threads-max=16512444
          vm.max_map_count=262144
          vm.min_free_kbytes=65536
          vm.overcommit_memory=1
