name: Slack Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    name: Send Test Notification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post to Slack
        env:
          SLACK_SERVICE: ${{ secrets.SLACK_SERVICE }}
        run: |
          set -euo pipefail
          curl -sSf -X POST \
            -H 'Content-type: application/json' \
            --data '{"text":"Test notification from AICR GitHub Actions"}' \
            "https://hooks.slack.com/services/${SLACK_SERVICE}"
