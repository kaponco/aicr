kind: RecipeResult
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  version: v0.11.1-next
  appliedOverlays:
    - base
    - monitoring-hpa
    - ocp
criteria:
  service: ocp
  accelerator: l40
  intent: inference
  os: rhel
  platform: any
constraints:
  - name: K8s.crd.clusterpolicies.nvidia.com.established
    value: "true"
  - name: K8s.crd.nodefeaturediscoveries.nfd.openshift.io.established
    value: "true"
  - name: K8s.server.version
    value: '>= 1.30'
componentRefs:
  - name: cert-manager
    namespace: cert-manager
    chart: cert-manager
    type: Helm
    source: https://charts.jetstack.io
    version: v1.17.2
    valuesFile: components/cert-manager/values.yaml
    overrides:
      enabled: false
  - name: gpu-operator
    namespace: nvidia-gpu-operator
    type: OLM
    dependencyRefs:
      - nfd-operator
    manifestFiles:
      - components/gpu-operator/manifests/dcgm-exporter.yaml
    installFiles:
      - components/gpu-operator/olm/install.yaml
    resourcesDir: components/gpu-operator/resources
    kinds:
      - ClusterPolicy
    customResources:
      - components/gpu-operator/resources/resources-ocp-training.yaml
      - components/gpu-operator/resources/resources-ocp.yaml
  - name: k8s-ephemeral-storage-metrics
    namespace: monitoring
    chart: k8s-ephemeral-storage-metrics
    type: Helm
    source: https://jmcgrath207.github.io/k8s-ephemeral-storage-metrics/chart
    version: 1.19.2
    valuesFile: components/k8s-ephemeral-storage-metrics/values.yaml
    overrides:
      enabled: false
    dependencyRefs:
      - kube-prometheus-stack
  - name: kai-scheduler
    namespace: kai-scheduler
    chart: kai-scheduler
    type: Helm
    source: oci://ghcr.io/nvidia/kai-scheduler
    version: v0.13.0
    valuesFile: components/kai-scheduler/values.yaml
    overrides:
      enabled: false
    dependencyRefs:
      - gpu-operator
  - name: kube-prometheus-stack
    namespace: monitoring
    chart: kube-prometheus-stack
    type: Helm
    source: https://prometheus-community.github.io/helm-charts
    version: 82.8.0
    valuesFile: components/kube-prometheus-stack/values.yaml
    overrides:
      enabled: false
  - name: nfd-operator
    namespace: openshift-nfd
    type: OLM
    installFiles:
      - components/nfd-operator/olm/install.yaml
    resourcesDir: components/nfd-operator/resources
    kinds:
      - NodeFeatureDiscovery
    customResources:
      - components/nfd-operator/resources/resources-ocp.yaml
  - name: nvidia-dra-driver-gpu
    namespace: nvidia-dra-driver
    chart: nvidia-dra-driver-gpu
    type: Helm
    source: https://helm.ngc.nvidia.com/nvidia
    version: 25.12.0
    valuesFile: components/nvidia-dra-driver-gpu/values.yaml
    overrides:
      enabled: false
    dependencyRefs:
      - gpu-operator
  - name: nvsentinel
    namespace: nvsentinel
    chart: nvsentinel
    type: Helm
    source: oci://ghcr.io/nvidia
    version: v1.1.0
    valuesFile: components/nvsentinel/values.yaml
    overrides:
      enabled: false
    dependencyRefs:
      - cert-manager
      - gpu-operator
  - name: prometheus-adapter
    namespace: monitoring
    chart: prometheus-adapter
    type: Helm
    source: https://prometheus-community.github.io/helm-charts
    version: 5.3.0
    valuesFile: components/prometheus-adapter/values.yaml
    overrides:
      enabled: false
    dependencyRefs:
      - kube-prometheus-stack
  - name: skyhook-operator
    namespace: skyhook
    chart: skyhook-operator
    type: Helm
    source: https://helm.ngc.nvidia.com/nvidia/skyhook
    version: v0.14.0
    valuesFile: components/skyhook-operator/values.yaml
    overrides:
      enabled: false
deploymentOrder:
  - cert-manager
  - kube-prometheus-stack
  - k8s-ephemeral-storage-metrics
  - nfd-operator
  - gpu-operator
  - kai-scheduler
  - nvidia-dra-driver-gpu
  - nvsentinel
  - prometheus-adapter
  - skyhook-operator
